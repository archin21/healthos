kind = "web"
previewPath = "/"
title = "HealthOS"
version = "1.0.0"
id = "artifacts/healthos"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21257

[services.development]
run = "pnpm --filter @workspace/healthos run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/healthos", "run", "build" ]
publicDir = "artifacts/healthos/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21257"
BASE_PATH = "/"
